<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Byrrgis — Coins</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- ── Status Bar ─────────────────────────────────────────── -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
        <rect x="0" y="8" width="3" height="4" rx="0.5" opacity="0.4"/>
        <rect x="4.5" y="5" width="3" height="7" rx="0.5" opacity="0.4"/>
        <rect x="9" y="2" width="3" height="10" rx="0.5"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5"/>
      </svg>
      <!-- WiFi -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M1 4.5C3.8 1.8 12.2 1.8 15 4.5" opacity="0.4"/>
        <path d="M3.5 7C5.1 5.4 10.9 5.4 12.5 7" opacity="0.7"/>
        <path d="M6 9.5C6.9 8.6 9.1 8.6 10 9.5"/>
        <circle cx="8" cy="12" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.35"/>
        <rect x="22.5" y="3.5" width="2" height="5" rx="1" fill="currentColor" fill-opacity="0.4"/>
        <rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/>
      </svg>
    </div>
  </div>

  <!-- ── Scrollable Content ─────────────────────────────────── -->
  <div class="scroll-area">

    <!-- Header -->
    <div class="page-header">
      <h1 class="page-title">Coins</h1>
      <button class="search-icon-btn" id="searchToggle" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <!-- Search (hidden until icon tapped) -->
    <div class="search-bar hidden" id="searchBar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search coins" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs">
      <button class="category-tab active">Vetted</button>
      <button class="category-tab">Trending</button>
      <button class="category-tab">Blue Chips</button>
      <button class="category-tab">New Listings</button>
    </div>

    <!-- Filter Row -->
    <div class="filter-row">
      <button class="filter-select" id="networkSelect">
        All networks
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button class="filter-select" id="timeSelect">
        24h
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <button class="filter-icon-btn" aria-label="More filters">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M4 6h16M7 12h10M10 18h4"/>
        </svg>
      </button>
    </div>

    <!-- Coins Table -->
    <div class="table-scroll-wrapper">
      <table class="coins-table">
        <thead>
          <tr>
            <th class="col-token">
              <span class="th-inner">Token
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/><path d="M5 12l7 7 7-7" opacity="0.4"/></svg>
              </span>
            </th>
            <th class="col-score">
              <span class="th-inner">Score
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/><path d="M5 12l7 7 7-7" opacity="0.4"/></svg>
              </span>
            </th>
            <th class="col-price">
              <span class="th-inner">Price / 24H
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/><path d="M5 12l7 7 7-7" opacity="0.4"/></svg>
              </span>
            </th>
            <th class="col-mcap">
              <span class="th-inner">MCap
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/><path d="M5 12l7 7 7-7" opacity="0.4"/></svg>
              </span>
            </th>
            <th class="col-liq">
              <span class="th-inner">Liquidity
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/><path d="M5 12l7 7 7-7" opacity="0.4"/></svg>
              </span>
            </th>
            <th class="col-holders">
              <span class="th-inner">Holders
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/><path d="M5 12l7 7 7-7" opacity="0.4"/></svg>
              </span>
            </th>
            <th class="col-vol">
              <span class="th-inner">Vol 24H
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7-7 7 7"/><path d="M5 12l7 7 7-7" opacity="0.4"/></svg>
              </span>
            </th>
            <th class="col-bs">
              <span class="th-inner">Buy / Sell</span>
            </th>
            <th class="col-trend">7D Trend</th>
            <th class="col-buy"></th>
          </tr>
        </thead>
        <tbody id="coinsTbody"></tbody>
      </table>
    </div>

  </div><!-- /scroll-area -->

  <!-- ── Tab Bar ─────────────────────────────────────────────── -->
  <nav class="tab-bar">
    <button class="tab-item active" onclick="window.location='index.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 6v2M12 16v2M9 9.27C9 8.02 10.34 7 12 7s3 1.02 3 2.27c0 2.73-6 2.27-6 5.46C9 16.03 10.34 17 12 17s3-1.02 3-2.27"/>
      </svg>
      <span class="tab-item__label">Coins</span>
    </button>
    <button class="tab-item" onclick="window.location='packs.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <rect x="5" y="6" width="14" height="8" rx="1"/>
        <path d="M2 20h20M6 20v-3M18 20v-3"/>
      </svg>
      <span class="tab-item__label">Packs</span>
    </button>
    <button class="tab-item" onclick="window.location='portfolio.html'">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3v18h18"/>
        <path d="M7 16l4-4 4 4 4-7"/>
      </svg>
      <span class="tab-item__label">Portfolio</span>
    </button>
  </nav>

</div><!-- /app -->

<script>
  const coins = [
    {
      id: 'aave', name: 'Aave', symbol: 'AAVE', chain: 'Ethereum', age: '4y',
      score: 87,
      price: '$169.42', change: '+2.14%', pos: true,
      mcap: '$2.5B',
      liq: '$35.9M', liqLocked: true,
      holders: '124K', holdersChange: '+1.2%', holdersPos: true,
      vol: '$48.2M', volChange: '+18.4%', volPos: true,
      buyPct: 62, buys: '1.2K', sells: '740',
      trend: 'up',
      avatarBg: '#B6509E', initial: 'A',
      link: 'coin-detail.html'
    },
    {
      id: 'usdt', name: 'Tether USD', symbol: 'USDT', chain: 'Ethereum', age: '6y',
      score: 91,
      price: '$1.001', change: '+0.01%', pos: true,
      mcap: '$144.5B',
      liq: '$15.4B', liqLocked: true,
      holders: '6.2M', holdersChange: '+0.4%', holdersPos: true,
      vol: '$82.1B', volChange: '+3.2%', volPos: true,
      buyPct: 54, buys: '4.1M', sells: '3.5M',
      trend: 'flat',
      avatarBg: '#26A17B', initial: 'U'
    },
    {
      id: 'uni', name: 'Uniswap', symbol: 'UNI', chain: 'Ethereum', age: '4y',
      score: 74,
      price: '$5.82', change: '-1.23%', pos: false,
      mcap: '$4.4B',
      liq: '$111.0M', liqLocked: false,
      holders: '312K', holdersChange: '-0.3%', holdersPos: false,
      vol: '$94.5M', volChange: '-7.8%', volPos: false,
      buyPct: 44, buys: '8.3K', sells: '10.6K',
      trend: 'down',
      avatarBg: '#FF007A', initial: '🦄', emoji: true
    },
    {
      id: 'trump', name: 'OFFICIAL TRUMP', symbol: 'TRUMP', chain: 'Solana', age: '5mo',
      score: 58,
      price: '$3.90', change: '-3.00%', pos: false,
      mcap: '$3.9B',
      liq: '$94.8M', liqLocked: false,
      holders: '892K', holdersChange: '-1.1%', holdersPos: false,
      vol: '$210.4M', volChange: '-22.3%', volPos: false,
      buyPct: 39, buys: '18.2K', sells: '28.5K',
      trend: 'down',
      avatarBg: '#B8860B', initial: 'T'
    },
    {
      id: 'bonk', name: 'Bonk', symbol: 'BONK', chain: 'Solana', age: '2y',
      score: 69,
      price: '$0.0000142', change: '+5.82%', pos: true,
      mcap: '$1.0B',
      liq: '$45.2M', liqLocked: true,
      holders: '2.1M', holdersChange: '+2.8%', holdersPos: true,
      vol: '$128.7M', volChange: '+41.2%', volPos: true,
      buyPct: 71, buys: '54.3K', sells: '22.1K',
      trend: 'up',
      avatarBg: '#D4620A', initial: 'B'
    },
    {
      id: 'ray', name: 'Raydium', symbol: 'RAY', chain: 'Solana', age: '3y',
      score: 78,
      price: '$2.89', change: '+1.45%', pos: true,
      mcap: '$733.2M',
      liq: '$18.6M', liqLocked: true,
      holders: '187K', holdersChange: '+0.9%', holdersPos: true,
      vol: '$31.4M', volChange: '+12.7%', volPos: true,
      buyPct: 58, buys: '6.7K', sells: '4.9K',
      trend: 'up',
      avatarBg: '#4E44CE', initial: 'R'
    },
    {
      id: 'wwl', name: 'WhiteWhale', symbol: 'WWL', chain: 'Solana', age: '1y',
      score: 42,
      price: '$0.0379', change: '-6.37%', pos: false,
      mcap: '$36.0M',
      liq: '$0', liqLocked: false,
      holders: '11.4K', holdersChange: '-2.1%', holdersPos: false,
      vol: '$1.2M', volChange: '-34.6%', volPos: false,
      buyPct: 31, buys: '312', sells: '694',
      trend: 'down',
      avatarBg: '#2E4A6A', initial: 'W'
    }
  ];

  const CHAIN_ICON = {
    Solana:   `<svg width="10" height="10" viewBox="0 0 128 128" fill="none"><path d="M24 88h80l-16 16H8l16-16zm0-32h80L88 72H8l16-16zm64-32H8L24 8h80L88 24z" fill="#9945FF"/></svg>`,
    Ethereum: `<svg width="10" height="10" viewBox="0 0 128 128" fill="none"><path d="M64 8l-40 56 40 24 40-24L64 8z" fill="#627EEA" opacity=".6"/><path d="M24 64l40 56 40-56-40 24L24 64z" fill="#627EEA"/></svg>`
  };

  function sparklinePath(trend) {
    if (trend === 'up')   return 'M2,28 L8,24 L16,20 L22,15 L30,18 L38,12 L46,8 L54,10 L62,6 L70,4';
    if (trend === 'down') return 'M2,4 L10,8 L18,6 L26,12 L34,18 L40,15 L48,22 L56,26 L64,24 L70,28';
    return 'M2,16 L12,14 L22,18 L32,15 L42,17 L52,14 L62,16 L70,15';
  }
  function sparklineColor(trend) {
    if (trend === 'up')   return 'var(--color-teal)';
    if (trend === 'down') return 'var(--color-red)';
    return '#8892A4';
  }

  function renderCoins(list) {
    const tbody = document.getElementById('coinsTbody');
    if (list.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" style="padding:32px;text-align:center;color:var(--text-muted);font-size:13px;">No coins found</td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(c => {
      const cls      = c.pos ? 'pos' : 'neg';
      const href     = c.link || 'coin-detail.html';
      const emojiStyle = c.emoji ? 'font-size:17px;' : '';
      const chainIcon  = CHAIN_ICON[c.chain] || '';
      const sellPct  = 100 - c.buyPct;
      const spColor  = sparklineColor(c.trend);
      const spPath   = sparklinePath(c.trend);

      return `
        <tr onclick="window.location='${href}'" data-chain="${c.chain}">

          <!-- Token -->
          <td class="col-token">
            <div class="token-cell">
              <div class="token-cell__avatar">
                <div class="token-cell__avatar-img" style="background:${c.avatarBg};${emojiStyle}">${c.initial}</div>
                <div class="token-cell__chain-badge">${chainIcon}</div>
              </div>
              <div class="token-cell__info">
                <div class="token-cell__name">${c.name}</div>
                <div class="token-cell__sub">${c.symbol} · ${c.age}</div>
              </div>
            </div>
          </td>

          <!-- Score -->
          <td class="col-score" style="text-align:center">
            <span class="score-badge">${c.score}</span>
          </td>

          <!-- Price / 24H -->
          <td class="col-price">
            <div class="tcell__primary">${c.price}</div>
            <div class="tcell__secondary ${cls}">${c.change}</div>
          </td>

          <!-- MCap -->
          <td class="col-mcap">
            <div class="tcell__primary">${c.mcap}</div>
          </td>

          <!-- Liquidity -->
          <td class="col-liq">
            <div class="tcell__primary">${c.liq}</div>
            ${c.liqLocked ? `<div class="tcell__icon-row"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--color-teal)" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span class="tcell__secondary muted" style="margin-top:0">Locked</span></div>` : ''}
          </td>

          <!-- Holders -->
          <td class="col-holders">
            <div class="tcell__primary">${c.holders}</div>
            <div class="tcell__secondary ${c.holdersPos ? 'pos' : 'neg'}">${c.holdersChange}</div>
          </td>

          <!-- Vol 24H -->
          <td class="col-vol">
            <div class="tcell__primary">${c.vol}</div>
            <div class="tcell__secondary ${c.volPos ? 'pos' : 'neg'}">${c.volChange}</div>
          </td>

          <!-- Buy / Sell bar -->
          <td class="col-bs">
            <div class="bs-bar">
              <div class="bs-bar__track">
                <div class="bs-bar__buy"  style="width:${c.buyPct}%"></div>
                <div class="bs-bar__sell" style="width:${sellPct}%"></div>
              </div>
              <div class="bs-bar__labels">
                <span class="buy-lbl">${c.buys}</span>
                <span class="sell-lbl">${c.sells}</span>
              </div>
            </div>
          </td>

          <!-- 7D Trend -->
          <td class="col-trend">
            <div class="sparkline">
              <svg width="72" height="32" viewBox="0 0 72 32" fill="none">
                <path d="${spPath}" stroke="${spColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </td>

          <!-- Buy -->
          <td class="col-buy">
            <button class="buy-pill-btn" onclick="event.stopPropagation()">Buy</button>
          </td>

        </tr>`;
    }).join('');
  }

  let currentChain = 'all';
  let currentSearch = '';

  function applyFilters() {
    let filtered = coins;
    if (currentChain !== 'all') {
      filtered = filtered.filter(c => c.chain === currentChain);
    }
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      filtered = filtered.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.symbol.toLowerCase().includes(q)
      );
    }
    renderCoins(filtered);
  }

  // Category tabs (UI only)
  document.querySelectorAll('.category-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Search toggle
  const searchToggle = document.getElementById('searchToggle');
  const searchBar    = document.getElementById('searchBar');
  const searchInput  = document.getElementById('searchInput');
  searchToggle.addEventListener('click', () => {
    const isHidden = searchBar.classList.toggle('hidden');
    if (!isHidden) searchInput.focus();
    else { searchInput.value = ''; currentSearch = ''; applyFilters(); }
  });

  // Search input
  searchInput.addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    applyFilters();
  });

  // Initial render
  renderCoins(coins);
</script>

</body>
</html>
